<h2> POST </h2>
<table>
    <thead>
        <tr>
            <th>ID: </th>
            <th>title: </th>
            <th>body: </th>
        </tr>
    </thead>
    <tbody>
        @for (post of post(); track post.id){
            <tr>
                <td> {{post.id}} </td>
                <td> {{post.title}} </td>
                <td> {{post.body}} </td>
            </tr>
        }
    </tbody>

</table>
