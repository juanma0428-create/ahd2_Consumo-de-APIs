<h2>Photos</h2>

<table>
    <thead>
        <tr>
            <th>albumId: </th>
            <th>id: </th>
            <th>title: </th>
            <th>url: </th>
            <th>thumbnailUrl: </th>
        </tr>
    </thead>
    <tbody>
        @for (photo of photos(); track photo.id){
            <tr>
                <td> {{photo.albumId}} </td>
                <td> {{photo.id}} </td>
                <td> {{photo.title}} </td>
                <td> {{photo.url}} </td>
                <td> {{photo.thumbnailUrl}} </td>
            </tr>
        }
    </tbody>

</table>
